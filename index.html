<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevGear Store - Find Your Setup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">DevGear<span>.</span></div>
      <div class="search-container">
        <input
          type="text"
          id="search-input"
          placeholder="Search gadgets, keyboards, mice..."
        />
      </div>
    </header>

    <div class="container">
      <aside class="sidebar">
        <h3>Filter by Category</h3>
        <div class="filter-group">
          <label class="filter-label">
            <input type="checkbox" class="category-filter" value="keyboard" />
            Keyboards
          </label>
          <label class="filter-label">
            <input type="checkbox" class="category-filter" value="mouse" /> Mice
          </label>
          <label class="filter-label">
            <input type="checkbox" class="category-filter" value="audio" />
            Audio
          </label>
          <label class="filter-label">
            <input type="checkbox" class="category-filter" value="monitor" />
            Monitors
          </label>
          <label class="filter-label">
            <input
              type="checkbox"
              class="category-filter"
              value="accessories"
            />
            Accessories
          </label>
        </div>
      </aside>

      <main class="main-content">
        <div class="content-header">
          <div class="results-count">
            Showing <span id="count-num">0</span> products
          </div>

          <div class="sort-container">
            <button class="sort-button" id="sort-button">
              <span class="sort-label">Sort By:</span>
              <span class="selected-sort" id="selected-sort">Default</span>
              <svg
                class="chevron-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m6 9 6 6 6-6" />
              </svg>
            </button>
            <ul class="sort-dropdown" id="sort-dropdown">
              <li data-value="default" class="active">Default</li>
              <li data-value="low-high">Price: Low to High</li>
              <li data-value="high-low">Price: High to Low</li>
              <li data-value="rating-high">Rating: High to Low</li>
              <li data-value="rating-low">Rating: Low to High</li>
              <li data-value="reviews-high">Reviews: High to Low</li>
              <li data-value="reviews-low">Reviews: Low to High</li>
            </ul>
          </div>
        </div>

        <div class="product-grid" id="product-grid">
          <!-- Products will be rendered here dynamically -->
        </div>

        <div id="no-results" class="hidden">
          <p>No products match your search or filter criteria.</p>
        </div>
      </main>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
