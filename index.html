<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevGear Store - Find Your Setup</title>

    <style>
      /* Reset & Base Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --bg: #f8fafc;
        --surface: #ffffff;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      }

      body {
        background-color: var(--bg);
        color: var(--text-main);
        line-height: 1.5;
      }

      /* Navbar - Glassmorphism */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 0.75rem 2rem;
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        position: sticky;
        top: 0;
        z-index: 100;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.025em;
        color: var(--text-main);
      }

      .logo span {
        color: var(--primary);
      }

      .search-container {
        flex: 0 1 450px;
        position: relative;
      }

      #search-input {
        width: 100%;
        padding: 0.75rem 1.25rem;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 0.95rem;
        outline: none;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        background: var(--surface);
      }

      #search-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
      }

      /* Layout Container */
      .container {
        display: flex;
        max-width: 1280px;
        margin: 2.5rem auto;
        padding: 0 1.5rem;
        gap: 2.5rem;
      }

      /* Sidebar */
      .sidebar {
        flex: 0 0 280px;
        background: var(--surface);
        padding: 1.75rem;
        border-radius: 20px;
        height: fit-content;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
      }

      .sidebar h3 {
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 1.25rem;
        color: var(--text-muted);
        font-weight: 700;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .filter-label {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        cursor: pointer;
        font-size: 0.95rem;
        color: var(--text-main);
        font-weight: 500;
        transition: color 0.2s;
      }

      .filter-label:hover {
        color: var(--primary);
      }

      .filter-label input {
        accent-color: var(--primary);
        width: 1.1rem;
        height: 1.1rem;
      }

      .sidebar hr {
        margin: 2rem 0;
        border: 0;
        border-top: 1px solid var(--border);
      }

      #sort-select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        background-color: var(--surface);
        color: var(--text-main);
        font-weight: 500;
        outline: none;
        cursor: pointer;
        transition: border-color 0.2s;
      }

      #sort-select:focus {
        border-color: var(--primary);
      }

      /* Main Content & Grid */
      .main-content {
        flex: 1;
      }

      .results-count {
        margin-bottom: 1.5rem;
        color: var(--text-muted);
        font-size: 0.95rem;
        font-weight: 500;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 2rem;
      }

      /* Product Cards */
      .product-card {
        background: var(--surface);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        position: relative;
        display: flex;
        flex-direction: column;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        animation: slideUp 0.5s ease-out forwards;
        height: 100%;
      }

      /* @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      } */

      .product-card:hover {
        transform: translateY(-8px);
        box-shadow: var(--shadow-lg);
        border-color: var(--primary);
      }

      .product-badge {
        position: absolute;
        top: 1rem;
        left: 1rem;
        background-color: #ef4444;
        color: white;
        padding: 0.35rem 0.75rem;
        font-size: 0.75rem;
        font-weight: 700;
        border-radius: 8px;
        z-index: 10;
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
      }

      .product-img-container {
        aspect-ratio: 16/10;
        background-color: #f1f5f9;
        overflow: hidden;
        position: relative;
      }

      .product-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .product-card:hover .product-img {
        transform: scale(1.1);
      }

      .product-info {
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        gap: 0.75rem;
      }

      .product-title {
        font-size: 1.125rem;
        font-weight: 700;
        color: var(--text-main);
        line-height: 1.4;
      }

      .product-desc {
        font-size: 0.875rem;
        color: var(--text-muted);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 0.5rem;
      }

      .product-price {
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--primary);
        margin-top: auto;
      }

      .product-rating {
        position: absolute;
        bottom: 1.5rem;
        right: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        background: rgba(255, 255, 255, 0.95);
        padding: 0.35rem 0.65rem;
        border-radius: 10px;
        font-size: 0.85rem;
        font-weight: 700;
        color: #f59e0b;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        border: 1px solid var(--border);
      }

      .product-rating span {
        color: var(--text-muted);
        font-weight: 500;
        font-size: 0.75rem;
      }

      /* Utilities for JS */
      .hidden {
        display: none !important;
      }

      #no-results {
        text-align: center;
        padding: 5rem 2rem;
        background: var(--surface);
        border-radius: 24px;
        color: var(--text-muted);
        border: 2px dashed var(--border);
      }

      #no-results p {
        font-size: 1.1rem;
        font-weight: 500;
      }

      /* Responsive */
      @media (max-width: 1024px) {
        .container {
          flex-direction: column;
        }
        .sidebar {
          flex: none;
          width: 100%;
        }
      }

      @media (max-width: 640px) {
        .navbar {
          padding: 1rem;
        }
        .search-container {
          width: 100%;
        }
        .product-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="navbar">
      <div class="logo">DevGear<span>.</span></div>
      <div class="search-container">
        <input
          type="text"
          id="search-input"
          placeholder="Search gadgets, keyboards, mice..."
        />
      </div>
    </header>

    <div class="container">
      <aside class="sidebar">
        <h3>Filter by Category</h3>
        <div class="filter-group">
          <label class="filter-label">
            <input type="checkbox" class="category-filter" value="keyboard" />
            Keyboards
          </label>
          <label class="filter-label">
            <input type="checkbox" class="category-filter" value="mouse" /> Mice
          </label>
          <label class="filter-label">
            <input type="checkbox" class="category-filter" value="audio" />
            Audio
          </label>
          <label class="filter-label">
            <input type="checkbox" class="category-filter" value="monitor" />
            Monitors
          </label>
          <label class="filter-label">
            <input type="checkbox" class="category-filter" value="accessories" />
            Accessories
          </label>
        </div>

        <hr />

        <h3>Sort By</h3>
        <select id="sort-select">
          <option value="default">Default</option>
          <option value="low-high">Price: Low to High</option>
          <option value="high-low">Price: High to Low</option>
          <option value="rating-high">Rating: High to Low</option>
          <option value="rating-low">Rating: Low to High</option>
        </select>
      </aside>

      <main class="main-content">
        <div class="results-count">
          Showing <span id="count-num">0</span> products
        </div>

        <div class="product-grid" id="product-grid">
          <!-- Products will be rendered here dynamically -->
        </div>

        <div id="no-results" class="hidden">
          <p>No products match your search or filter criteria.</p>
        </div>
      </main>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
